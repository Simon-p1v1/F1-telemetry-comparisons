services:
  backend:
    build:
      context: ./backend
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      LOG_LEVEL: "info"
      FASTF1_CACHE_DIR: "/app/.cache/fastf1"
    volumes:
      - fastf1-cache:/app/.cache/fastf1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fastf1-cache:
